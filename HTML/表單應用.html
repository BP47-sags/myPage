<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/mycss01.css">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            --text-color: #495057;
            --border-color: #e9ecef;
        }

        body {
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            padding-bottom: 50px;
        }

        /* 標題美化與修正：同時定義標準屬性 */
        .display-3,
        .display-4 {
            font-weight: 800 !important;
            background: var(--primary-gradient);

            /* 核心修正：解決相容性問題 */
            -webkit-background-clip: text;
            background-clip: text;

            -webkit-text-fill-color: transparent;
            color: transparent;
            /* 降級備用方案 */

            margin-bottom: 1.5rem !important;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        /* 插圖浮動動畫 */
        @keyframes float {
            0% {
                transform: translateY(0px) rotate(0deg);
            }

            50% {
                transform: translateY(-15px) rotate(5deg);
            }

            100% {
                transform: translateY(0px) rotate(0deg);
            }
        }

        .drink-icon {
            width: 80px;
            height: auto;
            animation: float 4s ease-in-out infinite;
        }

        /* 卡片化設計 */
        #myForm,
        #drinkList {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            /* 增加磨砂玻璃質感 */
            padding: 40px !important;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3) !important;
        }

        /* 表單元件美化 */
        .form-control,
        .form-select {
            border-radius: 12px;
            border: 2px solid #eee;
            padding: 12px 15px;
            transition: all 0.3s;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: #2575fc;
            box-shadow: 0 0 0 0.25rem rgba(37, 117, 252, 0.1);
        }

        /* 配料選項美化 */
        .form-check {
            background: #f8f9fa;
            margin: 5px;
            padding: 10px 15px 10px 40px;
            border-radius: 12px;
            display: inline-block;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
        }

        .form-check:hover {
            background: #eef2f7;
            border-color: #dee2e6;
        }

        /* 總價區域 */
        .total-price-section {
            background: rgba(106, 17, 203, 0.05);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border-left: 6px solid #6a11cb;
        }

        /* 按鈕美化 */
        .btn {
            padding: 12px 35px;
            border-radius: 50px;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            box-shadow: 0 5px 15px rgba(37, 117, 252, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(37, 117, 252, 0.4);
        }
    </style>

</head>

<body>
    <div class="container py-5">
        <div class="display-3 p-3 my-4 fw-700 text-center">
            <img src="https://cdn-icons-png.flaticon.com/512/3063/3063822.png" class="drink-icon" alt="icon">
            飲料訂購
            <img src="https://cdn-icons-png.flaticon.com/512/3504/3504827.png" class="drink-icon" alt="icon"
                style="animation-delay: -2s;">
        </div>

        <div class="row">
            <div class="col-12">
                <form id="myForm">

                    <div class="mb-3 form-floating">
                        <input type="text" class="form-control" id="username" placeholder="">
                        <label for="" class="form-label">訂購者名稱(2~5字)</label>
                        <div class="valid-feedback">輸入符合規定</div>
                        <div class="invalid-feedback">輸入不符合規定</div>
                    </div>

                    <div class="mb-3">
                        <label for="" class="form-label">產品名稱</label>
                        <input type="text" class="form-control" id="productname" placeholder="字數2~6">
                        <div class="valid-feedback">輸入符合規定</div>
                        <div class="invalid-feedback">輸入不符合規定</div>
                    </div>

                    <div class="row">
                        <div class="col-12">
                            <select name="" id="ice" class="form-select form-select-lg is-invalid">
                                <option value="--" class="text-center" disabled selected>--請選擇冰度--</option>
                                <option value="全冰">全冰</option>
                                <option value="少冰">少冰</option>
                                <option value="微冰">微冰</option>
                                <option value="去冰">去冰</option>
                            </select>
                            <div class="valid-feedback">已選擇</div>
                            <div class="invalid-feedback">必須選擇冰度</div>
                        </div>
                    </div>

                    <div class="m-3"></div>
                    <label for="" class="form-label">單點配料(每樣10元)</label>
                    <div class="row ms-1">
                        <div class="form-check">
                            <input type="checkbox" name="add" class="form-check-input" value="粉圓">
                            <label for="" class="form-check-label">粉圓</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" name="add" class="form-check-input" value="QQ">
                            <label for="" class="form-check-label">QQ</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" name="add" class="form-check-input" value="紅豆">
                            <label for="" class="form-check-label">紅豆</label>
                        </div>
                        <div class="form-check">
                            <input type="checkbox" name="add" class="form-check-input" value="綠豆">
                            <label for="" class="form-check-label">綠豆</label>
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3">
                            <label for="" class="form-label">數量: <span class="text-primary h3 fw-400"
                                    id="num_text">1</span>杯</label>
                            <input type="range" class="form-range" value="1" min="1" max="10" step="1" id="num">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3">
                            <label for="" class="form-label">單價: <span class="text-warning h3 fw-400"
                                    id="prize_text">50</span>元</label>
                            <label for="" class="form-label">配料: <span class="text-warning h3 fw-400"
                                    id="add_text"></span>元</label>
                            <input type="range" class="form-range" value="50" min="10" max="90" step="5" id="prize">
                        </div>
                    </div>

                    <div class="row">
                        <div class="mb-3">
                            <label for="" class="form-label">備註(2~10字)</label>
                            <textarea name="" id="usertext" class="form-control"></textarea>
                            <div class="valid-feedback">輸入符合規定</div>
                            <div class="invalid-feedback">輸入不符合規定</div>
                        </div>
                    </div>

                    <div class="h2 fw-700 text-secondary">
                        <label for="" class="form-label">總價: <span class="text-success h2 fw-700"
                                id="totalPrice"></span>元</label>
                    </div>


                    <button type="" class="btn btn-dark">取消</button>
                    <button type="submit" class="btn btn-primary">送出</button>

                </form>
            </div>
        </div>

        <div class="display-4 p-3 my-4 fw-700 text-center">飲料訂購明細</div>
        <div class="container" id="drinkList" style="padding: 10px; border: 1px solid #ddd; background: #f9f9f9;">
            尚未有訂購資料</div>
    </div>

    </div>
    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/jquery-4.0.0.js"></script>
    <script>

        // 公有變數
        let flag_username = false;
        let flag_productname = false;
        let flag_ice = false;
        let flag_usertext = false;


        // 主程式
        $(function () {
            // 表單程式區塊
            $("#myForm").submit(function (e) {
                if (flag_username && flag_productname) {
                    e.preventDefault();
                    console.log("form表單觸發");
                    console.log($("#username").val());
                    console.log($("#productname").val());
                }
                else {
                    e.preventDefault();
                    alert("欄位有誤，請修正");
                }
            })

            $("#username").blur(function () {
                if ($(this).val().length > 1 && $(this).val().length < 6) {
                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_username = true;
                }
                else {
                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_username = false;
                }
            });

            $("#productname").blur(function () {
                if ($(this).val().length > 1 && $(this).val().length < 7) {
                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_productname = true;
                }
                else {
                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_productname = false;
                }
            });

            $("#ice").change(function () {
                $(this).removeClass("is-invalid").addClass("is-valid");
                flag_ice = true;
            });

            $("#usertext").blur(function () {
                if ($(this).val().length > 1 && $(this).val().length < 11) {
                    $(this).removeClass("is-invalid").addClass("is-valid");
                    flag_productname = true;
                }
                else {
                    $(this).removeClass("is-valid").addClass("is-invalid");
                    flag_productname = false;
                }
            });

            let drinkNum = 1;
            let drinkPrice = 50;
            let addPrice = 0;
            let totalPrice = 0;
            let checked = [];

            $("#num").on("input", function () {
                drinkNum = $(this).val();
                $("#num_text").text(drinkNum);

                totalPrice = (drinkPrice + addPrice) * drinkNum;
                $("#totalPrice").text(totalPrice);
            });

            $("#add_text").text("0");
            $("input[name='add']").change(function () {
                checked = $("input[name='add']:checked");
                let checkedCount = checked.length;
                addPrice = checkedCount * 10;
                $("#add_text").text(addPrice);

                totalPrice = (drinkPrice + addPrice) * drinkNum;
                $("#totalPrice").text(totalPrice);
            });

            $("#prize").on("input", function () {
                drinkPrice = Number($(this).val());
                $("#prize_text").text(drinkPrice);

                totalPrice = (drinkPrice + addPrice) * drinkNum;
                $("#totalPrice").text(totalPrice);
            });


            const userForm = document.getElementById('myForm');
            const resultDisplay = document.getElementById('drinkList');

            userForm.addEventListener('submit', function (e) {

                e.preventDefault();
                drinkList.innerHTML = "";

                const now = new Date();
                const format = (num) => num.toString().padStart(2, '0');
                const createTime = `${now.getFullYear()}/${format(now.getMonth() + 1)}/${format(now.getDate())} -- ${format(now.getHours())}:${format(now.getMinutes())}`;

                const name = document.getElementById('username').value;
                const pname = document.getElementById('productname').value;
                const myice = document.getElementById('ice').value;
                const utext = document.getElementById('usertext').value;

                const values = Array.from(checked).map(cb => cb.value);

                resultDisplay.innerHTML = `<div class="order-item"><span class="order-label">提交時間</span><span class="order-value">${createTime}</span></div><div class="order-item"><span class="order-label">訂購者 / 產品</span><span class="order-value">${name} - ${pname}</span></div><div class="order-item"><span class="order-label">規格</span><span class="order-value">${myice} | 配料: ${values.join(", ") || '無'}</span></div><div class="order-item"><span class="order-label">數量</span><span class="order-value">${drinkNum} 杯</span></div><div class="order-item" style="border:none"><span class="order-label">應付總額</span><span class="order-value text-danger" style="font-size: 1.5rem;">$${totalPrice}</span></div><div class="mt-3 p-2 bg-light rounded" style="font-size: 0.9rem;"><strong>備註：</strong> ${utext || '無'}</div>`;

            });
        });

    </script>
</body>

</html>
